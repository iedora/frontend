# Stage 3 (AppState) — runs every Stage-3 configurator against the live
# infra. Registry at `infra/deploy/cmd/iedora/configurators.go`.
#
# Triggers:
#
#   workflow_dispatch                — primary trigger. Dispatched
#                                      explicitly by web.yml's
#                                      `run_app_state` job before
#                                      Stage 4 deploys, or by
#                                      operators when reconciling
#                                      app state out-of-band.
#   push (paths-filtered)            — push to main touching the
#                                      reconciler code or a
#                                      configurator's source tree.
#
# Previously this also had a `workflow_run` trigger on `[infra] Deploy`
# completion. Removed: the cascade was unreliable (fired ~half the
# time in practice), and the dispatch-and-follow pattern in web.yml
# is deterministic — we know which specific run gates the deploy.

name: '[infra] App state'

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'infra/app-state/**'
      - 'infra/deploy/cmd/iedora/configurators.go'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/app-state.yml'

concurrency:
  group: app-state
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Wait for ghcr.io/eduvhc/web:latest
        # Both Stage-3 configurators (`core-db-migrations`,
        # `menu-db-migrations`) `docker run --rm <web-image>` on the
        # box. On a fresh Day 1, the web image is being built in
        # parallel by `web.yml`; if `[infra] Deploy` finishes first this
        # workflow would crash on `docker pull`. Block here until GHCR
        # exposes a `latest` tag for `ghcr.io/eduvhc/web`.
        #
        # The GHCR `web` package is PRIVATE. The repo's GITHUB_TOKEN
        # (scoped to iedora repo, not the user's packages) can't see
        # it, so we can't poll via the user-packages API with that
        # token. Use IAC_BOOTSTRAP_GHCR_TOKEN (the same PAT used to
        # push the image) which has read access to the owner's
        # private packages — alias it to GH_TOKEN so the gh CLI picks
        # it up.
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          bin/iedora-env bash -c '
            set -euo pipefail
            [ -n "${IAC_BOOTSTRAP_GHCR_TOKEN:-}" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
            export GH_TOKEN="$IAC_BOOTSTRAP_GHCR_TOKEN"
            deadline=$(( $(date +%s) + 1800 ))   # 30 min budget
            while true; do
              if gh api -H "Accept: application/vnd.github+json" \
                   /user/packages/container/web/versions \
                   --jq ".[].metadata.container.tags[]" 2>/dev/null \
                   | grep -qx "latest"; then
                echo "✓ ghcr.io/eduvhc/web:latest is available"
                break
              fi
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "✗ ghcr.io/eduvhc/web:latest still missing after 30 min — abort"
                exit 1
              fi
              echo "ghcr.io/eduvhc/web:latest not yet pushed — waiting 30s"
              sleep 30
            done
          '

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install OpenTofu
        # Stage 3 reads `hetzner_ipv4` via `tofu output -raw` so it can
        # SSH to the box (menu-db-migrations + openobserve-dashboards).
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.12.0'
          tofu_wrapper: false

      - name: Configure SSH (Stage 3 configurators SSH to the box)
        # SSH key comes from BWS (IAC_BOOTSTRAP_SSH_PRIVATE_KEY), hydrated
        # via bin/iedora-env. Single source of truth — not a separate GH
        # Actions secret.
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          bin/iedora-env bash -c 'printf "%s\n" "$IAC_BOOTSTRAP_SSH_PRIVATE_KEY"' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'StrictHostKeyChecking accept-new\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: bin/iedora app apply
        run: bin/iedora-env bin/iedora app apply
