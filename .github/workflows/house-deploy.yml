# House CD — Astro static build → Cloudflare Workers Static Assets,
# fully declarative via Tofu (no wrangler in the deploy path).
#
# Provider: cloudflare/cloudflare 5.11+ uploads the dist/ directory
# directly (chunked, parallel) inside `cloudflare_workers_script.assets`.
# Tofu reconciles the worker, the apex custom domain, the auto-DNS, and
# the TLS cert in one apply.
#
# State lives encrypted in git (rule #5 of infra/CLAUDE.md). CI fetches
# `INFRA_STATE_PASSPHRASE` from BWS to decrypt it. State drift on the
# runner is discarded after the job — the next CI checkout reads the
# laptop-committed state. Cloudflare's API is idempotent enough that any
# drift converges in one refresh.

name: House deploy

on:
  push:
    branches: [main]
    paths:
      - 'products/house/**'
      - 'packages/design-system/**'
      - 'bun.lock'
      - '.github/workflows/house-deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-house
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write  # commit the encrypted tfstate back after apply

    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ vars.BWS_PROJECT_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Astro requires Node >=22.12. The default ubuntu-24.04 Node is 20.x.
      # setup-node BEFORE the composite Bun setup so the version is
      # established before any install step reads it.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - uses: ./.github/actions/setup

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: '1.36.0'

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: '1.12.0'
          tofu_wrapper: false

      # `just deploy` runs `bun run build` (Astro static output) then
      # `tofu apply`. bin/with-secrets pulls TF_VAR_state_passphrase +
      # TF_VAR_cloudflare_api_token + TF_VAR_account_id out of BWS.
      - name: just house::deploy
        working-directory: products/house/infra
        env:
          # OpenTofu 1.12+: machine-readable apply log → tempfile;
          # human-readable stays on stdout. Uploaded as artifact below.
          TF_CLI_ARGS_apply: "-json-into=${{ runner.temp }}/tf-apply.json"
        run: just deploy

      - name: Upload tofu apply JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tofu-apply-json-house
          path: ${{ runner.temp }}/tf-apply.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit state back to main
        # Same rationale as infra-deploy.yml: encrypted Tofu state is the
        # source of truth, CI applies that don't commit back leave git
        # stale and the next run drifts. Idempotent — skips when there's
        # no state diff.
        if: success()
        working-directory: products/house/infra
        run: |
          set -euo pipefail
          if git diff --quiet -- tofu/terraform.tfstate; then
            echo "[house-deploy] no state changes — nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tofu/terraform.tfstate
          # Multi-line via -F so un-indented embedded newlines don't
          # terminate the YAML `run: |` block — see infra-deploy.yml.
          MSG=$(mktemp)
          {
            echo "chore(house): tfstate updated by CI (${GITHUB_WORKFLOW} #${GITHUB_RUN_NUMBER})"
            echo ""
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Triggered by: ${GITHUB_EVENT_NAME}"
          } > "$MSG"
          git commit -F "$MSG"
          rm -f "$MSG"
          for i in 1 2; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "[house-deploy] state committed + pushed"
              exit 0
            fi
            echo "[house-deploy] push attempt $i failed, retrying..."
          done
          echo "[house-deploy] FAIL: couldn't push state after 2 attempts" >&2
          exit 1
