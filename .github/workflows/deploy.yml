# Stage 4 (Deploy) — reusable workflow that ships one product's artifact
# to its runtime. Called via workflow_call from `[apps:web] CI` (web.yml).
# Today the only deployable artifact is `web` (one Next.js image serving
# menu.iedora.com / core.iedora.com / iedora.com via host-based proxy).
#
# Generic over product name: the inner `bin/iedora deploy <product>`
# dispatches through the productRuntime interface, so adding a future
# product with its own runtime = (1) new struct in
# `infra/deploy/cmd/iedora/products.go`, (2) new caller workflow that
# invokes THIS workflow with `inputs.product=<name>`.

name: '[deploy] product'

on:
  workflow_call:
    inputs:
      product:
        description: 'Product name (matches `infra/deploy/cmd/iedora/products.go` registry — `web` today).'
        type: string
        required: true
      image_sha:
        description: 'Image tag for Docker-runtime products. Defaults to "latest" for first-bootstrap.'
        type: string
        required: false
        default: latest
    secrets:
      BWS_ACCESS_TOKEN:
        required: true

# Per-product concurrency: two deploys of the same product serialise
# (the second waits — never cancel mid-flight, `docker stop` on a
# half-replaced container is the worst-of-both-worlds state). When a
# second product lands, both can deploy in parallel under their own
# concurrency groups.
concurrency:
  group: deploy-${{ inputs.product }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: '${{ inputs.product }}'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      # Forwarded to the dockerOnHetzner runtime — it reads IMAGE_SHA at
      # deploy time (named per the productRuntime contract's
      # `imageSHAEnv` field on each product struct in products.go).
      IMAGE_SHA: ${{ inputs.image_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/infra/install-bws

      - name: Install Go
        # Needed for `go run`-style execution of `bin/iedora`.
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Install OpenTofu
        # The dockerOnHetzner runtime calls `tofu output -raw <name>` to
        # read Stage-2-minted env values (DB URLs, R2 creds, OTel
        # endpoint, …) and forwards them into the container.
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.12.0'
          tofu_wrapper: false

      - name: tofu init (backend setup for tofu output)
        # `tofu output -raw <name>` requires the s3 backend (Cloudflare R2)
        # to be initialized. Without this step, the Go runtime fails with
        # "Backend initialization required, please run tofu init".
        # -lock-timeout=5m to coexist gracefully with infra-deploy's
        # in-flight refresh, if any.
        run: bin/iedora-env tofu -chdir=infra/iac/tofu init -input=false -upgrade -lock-timeout=5m

      - uses: ./.github/actions/infra/ssh-setup
        with:
          bws-access-token: ${{ secrets.BWS_ACCESS_TOKEN }}

      - name: bin/iedora deploy ${{ inputs.product }}
        run: bin/iedora-env bin/iedora deploy ${{ inputs.product }}

      - name: Smoke check
        if: inputs.product == 'web'
        run: bash .github/scripts/smoke-check.sh https://menu.iedora.com/up
