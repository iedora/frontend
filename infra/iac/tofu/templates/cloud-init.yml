#cloud-config
package_update: true
package_upgrade: false
packages:
  - ca-certificates
  - curl
  - jq

write_files:
  - path: /etc/ssh/sshd_config.d/iedora.conf
    content: |
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      KbdInteractiveAuthentication no

  - path: /root/.docker/config.json
    permissions: '0600'
    content: |
      {
        "auths": {
          "ghcr.io": {
            "auth": "${ghcr_auth_b64}"
          }
        }
      }

  - path: /etc/iedora/docker-compose.yml
    permissions: '0600'
    content: |
      ${indent(6, compose_yaml)}

  - path: /etc/iedora/postgres-init/init.sql
    content: |
      ${indent(6, postgres_init_sql)}

  - path: /etc/systemd/system/iedora.service
    content: |
      ${indent(6, systemd_unit)}

runcmd:
  - install -d -o root -g root -m 0755 /root/infra-postgres/data
  - install -d -o root -g root -m 0755 /root/infra-openobserve/openobserve-data
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker
  - systemctl daemon-reload
  - systemctl enable --now iedora.service
  - systemctl restart sshd
