# CI orchestrator — referencia os 2 composite actions paralelos:
#
#   ci     → .gitea/actions/ci      (correctness: typecheck/lint/test)
#   audit  → .gitea/actions/audit   (security: gitleaks/hadolint/osv-scanner)
#
# Composite actions têm a sua própria pasta + bash em .sh (não inline)
# para manter este workflow thin + cada concern auto-contida + testável
# isoladamente. Quando o Gitea fixar #34986 (workflow_call broken para
# self-hosted runners) podemos extrair cada job para o seu workflow file.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Segunda 06:00 UTC — pesca CVEs novas que apareceram na OSV durante
    # a semana mesmo sem push. Só o job `audit` corre (ver `if:` no `ci`).
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name != 'schedule'
    # bun-debian label = oven/bun:1.3-debian (mapeado em
    # homelab-core-infra/gitea-runner-config.yaml).
    runs-on: bun-debian
    timeout-minutes: 15
    container:
      image: oven/bun:1.3-debian
      # Bind-mount directo do bun install cache do host. Filesystem access
      # nativo → ~5s restore (vs ~2min com actions/cache + cache-server).
      volumes:
        - /var/cache/bun:/root/.bun/install/cache
    steps:
      - uses: actions/checkout@v4
      - uses: ./.gitea/actions/ci

  audit:
    runs-on: bun-debian
    timeout-minutes: 10
    container:
      image: oven/bun:1.3-debian
      # Bind-mount /opt/audit-bin cache → /var/cache/audit-tools no host.
      # Binários (gitleaks/hadolint/osv-scanner) persistem entre runs.
      volumes:
        - /var/cache/audit-tools:/opt/audit-bin
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks precisa do histórico completo para varrer commits.
          fetch-depth: 0
      - uses: ./.gitea/actions/audit
