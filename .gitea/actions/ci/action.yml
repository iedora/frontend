# Composite action: CI correctness gate.
#
# Roda no container `oven/bun:1.3-debian` (caller responsável pelo container
# + bind-mount /var/cache/bun:/root/.bun/install/cache). Caller também
# responsável pelo checkout antes de chamar este action.
#
# Cada step é deliberadamente um one-liner — não há lógica complexa aqui.
# Pode crescer no futuro (matrix por workspace, coverage upload, etc.)
# mantendo a interface estável: o caller só precisa de `uses: ./.gitea/actions/ci`.

name: 'CI checks'
description: 'Correctness gate: typecheck + lint + test em todos os workspaces.'

runs:
  using: composite
  steps:
    - name: Install workspace deps
      shell: bash
      run: bun install --frozen-lockfile

    - name: typecheck (all workspaces via tsc --build refs)
      shell: bash
      run: bun run typecheck

    - name: lint (all workspaces in parallel)
      shell: bash
      run: bun run lint

    - name: test (all workspaces)
      shell: bash
      run: bun run test
