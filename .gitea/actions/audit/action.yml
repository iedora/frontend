# Composite action: Security audit gate.
#
# Roda no container `oven/bun:1.3-debian` (caller responsável pelo
# container + bind-mount /var/cache/audit-tools:/opt/audit-bin). Caller
# também responsável pelo checkout com `fetch-depth: 0` (gitleaks scaneia
# o histórico completo).
#
# 3 tools sequenciais — cada ~1-5s steady-state, ~25s no cold start:
#   gitleaks     v8.30.1  secrets scan (~150 regex patterns)
#   hadolint     v2.14.0  Dockerfile lint
#   osv-scanner  v2.3.8   npm/bun lockfile vs OSV CVE database
#
# Lógica de install vive em scripts/install-tools.sh (composite actions
# resolvem o path do action via $GITHUB_ACTION_PATH). Manter bash em
# .sh permite shellcheck local + testes isolados.
#
# Supressões/baselines vivem na raiz do repo (caller-context):
#   .gitleaks-baseline.json   23 leaks histórico stale
#   osv-scanner.toml          2 CVEs medium tracked upstream

name: 'Security audit'
description: 'gitleaks + hadolint + osv-scanner. Idempotent install via host bind-mount cache.'

inputs:
  gitleaks-version:
    description: 'gitleaks release tag (sem o `v`).'
    required: false
    default: '8.30.1'
  hadolint-version:
    description: 'hadolint release tag (sem o `v`).'
    required: false
    default: '2.14.0'
  osv-version:
    description: 'osv-scanner release tag (sem o `v`).'
    required: false
    default: '2.3.8'

runs:
  using: composite
  steps:
    - name: Restore or install audit binaries
      shell: bash
      env:
        GITLEAKS_VERSION: ${{ inputs.gitleaks-version }}
        HADOLINT_VERSION: ${{ inputs.hadolint-version }}
        OSV_VERSION: ${{ inputs.osv-version }}
      # bash explícito (não count com +x ter sobrevivido git → tar → checkout
      # em todos os filesystems). $GITHUB_ACTION_PATH é injectado pelo runner
      # para apontar à dir deste action.
      run: bash "$GITHUB_ACTION_PATH/scripts/install-tools.sh"

    - name: gitleaks (secret scan — full history, baseline-filtered)
      # --baseline-path: ignora os 23 findings históricos pre-adoção. CI
      # bloqueia apenas leaks NOVOS. Para re-gerar baseline (depois de
      # purge de história):
      #   gitleaks detect --report-format json --report-path .gitleaks-baseline.json
      shell: bash
      run: /opt/audit-bin/gitleaks detect --baseline-path .gitleaks-baseline.json --redact --verbose --no-banner --exit-code 1

    - name: hadolint (Dockerfile lint)
      # failure-threshold=error → warnings aparecem no log mas não quebram
      # CI. Próxima leva: corrigir DL4006 (real bug — exit code do
      # `npm install … | tail -3` é o do tail).
      shell: bash
      run: /opt/audit-bin/hadolint --failure-threshold error apps/web/Dockerfile

    - name: osv-scanner (lockfile CVEs)
      # Picks up osv-scanner.toml do cwd automaticamente. Suppressões
      # known + tracked vivem lá com rationale + review date (RFC3339).
      shell: bash
      run: /opt/audit-bin/osv-scanner --lockfile=bun.lock
